<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custo de Transporte | DevSystems</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-2xl w-full glass-card rounded-[2.5rem] shadow-2xl p-8 md:p-12 relative overflow-hidden">
        
        <a href="../../index.html" class="inline-flex items-center gap-2 text-slate-400 hover:text-amber-400 transition-colors mb-8 group">
            <span class="group-hover:-translate-x-1 transition-transform">←</span> Painel de Controle
        </a>

        <header class="mb-10">
            <h1 class="text-4xl font-extrabold text-white tracking-tight mb-2">
                Custo de <span class="text-amber-400">Transporte</span>
            </h1>
            <p class="text-slate-400">Calcule o investimento mensal em logística por volume de funcionários.</p>
        </header>

        <div class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="flex flex-col gap-2">
                    <label class="text-sm font-semibold text-slate-300 ml-1">Qtd. de Funcionários</label>
                    <input type="number" id="qtdPessoas" placeholder="Ex: 50" 
                        class="bg-slate-900/50 border border-white/10 rounded-xl p-4 text-white focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all">
                </div>
                <div class="flex flex-col gap-2">
                    <label class="text-sm font-semibold text-slate-300 ml-1">Dias Úteis no Mês</label>
                    <input type="number" id="diasUteis" placeholder="Ex: 22" 
                        class="bg-slate-900/50 border border-white/10 rounded-xl p-4 text-white focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all">
                </div>
            </div>

            <button onclick="calcularTransporte()" 
                class="w-full bg-gradient-to-r from-amber-600 to-orange-600 hover:from-amber-500 hover:to-orange-500 text-white font-bold py-4 rounded-xl shadow-lg shadow-amber-900/20 transition-all transform hover:scale-[1.02] active:scale-95">
                Calcular Custo Mensal Total
            </button>

            <div id="resultadoContainer" class="hidden mt-8 p-6 bg-white/5 border border-white/10 rounded-2xl flex flex-col items-center">
                <span class="text-slate-500 text-xs uppercase tracking-widest font-bold mb-2">Estimativa de Investimento</span>
                <div class="text-4xl font-black text-amber-400" id="valorTotal">R$ 0,00</div>
                <div id="infoTaxa" class="mt-2 text-slate-400 text-xs italic"></div>
            </div>
        </div>

        <footer class="mt-12 pt-6 border-t border-white/5 flex justify-between items-center text-[10px] text-slate-500 uppercase tracking-widest">
            <span>Logística & Benefícios</span>
            <span id="datetime">--/--/-- --:--:--</span>
        </footer>

    </div>

    <script src="script.js"></script>
</body>
</html>
