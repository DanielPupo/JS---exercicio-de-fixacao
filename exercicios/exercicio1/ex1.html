<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horas Extras | DevSystems</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        input::placeholder { color: rgba(148, 163, 184, 0.5); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-2xl w-full glass-card rounded-[2.5rem] shadow-2xl p-8 md:p-12 relative overflow-hidden">
        
        <a href="../../index.html" class="inline-flex items-center gap-2 text-slate-400 hover:text-white transition-colors mb-8 group">
            <span class="group-hover:-translate-x-1 transition-transform">←</span> Voltar ao Painel
        </a>

        <header class="mb-10">
            <h1 class="text-4xl font-extrabold text-white tracking-tight mb-2">
                Cálculo de <span class="text-blue-400">Horas Extras</span>
            </h1>
            <p class="text-slate-400">Preencha os dados abaixo para simular o valor total.</p>
        </header>

        <div class="space-y-6">
            <div class="grid grid-cols-1 gap-6">
                <div class="flex flex-col gap-2">
                    <label class="text-sm font-semibold text-slate-300 ml-1">Salário Bruto (R$)</label>
                    <input type="number" id="salario" placeholder="Ex: 3500" 
                        class="bg-slate-900/50 border border-white/10 rounded-xl p-4 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="flex flex-col gap-2">
                        <label class="text-sm font-semibold text-slate-300 ml-1">Horas Extras (Dias Úteis)</label>
                        <input type="number" id="horasUteis" placeholder="0" 
                            class="bg-slate-900/50 border border-white/10 rounded-xl p-4 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-sm font-semibold text-slate-300 ml-1">Horas Extras (FDS/Feriado)</label>
                        <input type="number" id="horasFDS" placeholder="0" 
                            class="bg-slate-900/50 border border-white/10 rounded-xl p-4 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
                    </div>
                </div>
            </div>

            <button onclick="calcularHE()" 
                class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-900/20 transition-all transform hover:scale-[1.02] active:scale-95">
                Calcular Total a Receber
            </button>

            <div id="resultado" class="mt-8 p-6 bg-white/5 border border-white/10 rounded-2xl text-center">
                <span class="text-slate-400 block text-sm uppercase tracking-widest mb-1">Resultado Estimado</span>
                <div class="text-3xl font-bold text-emerald-400" id="valorFinal">R$ 0,00</div>
            </div>
        </div>

        <footer class="mt-12 pt-6 border-t border-white/5 flex justify-between items-center text-[10px] text-slate-500 uppercase tracking-widest">
            <span>DevSystems Pro</span>
            <span id="datetime">--/--/-- --:--:--</span>
        </footer>

    </div>

    <script src="script.js"></script>
</body>
</html>
